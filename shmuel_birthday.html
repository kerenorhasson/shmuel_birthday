<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>יום הולדת שמח שמואל!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #10b981;
            --accent: #f59e0b;
            --bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rubik', sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 1000px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: cardFloat 6s ease-in-out infinite;
            transform-style: preserve-3d;
        }

        @keyframes cardFloat {

            0%,
            100% {
                transform: translateY(0) rotateX(0deg);
            }

            50% {
                transform: translateY(-20px) rotateX(2deg);
            }
        }

        .hero-image {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 24px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            border: 2px solid var(--glass-border);
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 8px;
            background: linear-gradient(to right, #60a5fa, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        }

        .age {
            font-size: 5rem;
            font-weight: 900;
            color: var(--accent);
            display: block;
            line-height: 1;
            margin: 10px 0;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }
        }

        .message {
            font-size: 1.25rem;
            line-height: 1.6;
            margin-bottom: 32px;
            color: #cbd5e1;
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 32px;
        }

        .feature-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            flex: 1;
            transition: all 0.3s ease;
        }

        .feature-item:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
        }

        .icon {
            font-size: 2rem;
            margin-bottom: 8px;
            display: block;
        }

        .cta-button {
            background: linear-gradient(135deg, #4f46e5, #06b6d4);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 1.25rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4);
            text-decoration: none;
            display: inline-block;
        }

        .cta-button:hover {
            transform: scale(1.05);
            box-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.5);
        }

        /* Decorations */
        .decoration {
            position: absolute;
            z-index: 1;
            pointer-events: none;
            opacity: 0.5;
            animation: float 8s infinite ease-in-out;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) rotate(0deg);
            }

            33% {
                transform: translate(20px, -30px) rotate(10deg);
            }

            66% {
                transform: translate(-20px, 20px) rotate(-10deg);
            }
        }

        #ball {
            top: 10%;
            left: 10%;
            font-size: 3rem;
        }

        #book {
            bottom: 10%;
            right: 10%;
            font-size: 3rem;
            animation-delay: -2s;
        }

        #star {
            top: 20%;
            right: 15%;
            font-size: 2rem;
            animation-delay: -4s;
        }

        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #ffd300;
            top: -10px;
            opacity: 0;
            z-index: 100;
        }
    </style>
</head>

<body>
    <div class="decoration" id="ball">⚽</div>
    <div class="decoration" id="book">📖</div>
    <div class="decoration" id="star">✨</div>

    <div class="container">
        <div class="card">
            <img src="C:\Users\KerenOrH\.gemini\antigravity\brain\052712fd-add4-4318-a7f1-7c4ffff8a00f\shmuel_birthday_hero_1778570669310.png"
                alt="Birthday Illustration" class="hero-image">
            <h1>מזל טוב, שמואל!</h1>
            <span class="age">6</span>
            <div class="message">
                <p>לילד הכי מוכשר בעולם!</p>
                <p>שתמשיך להבקיע שערים מדהימים במגרש,</p>
                <p>ולגלות עולמות קסומים בין דפי הספרים.</p>
            </div>

            <div class="features">
                <div class="feature-item">
                    <span class="icon">⚽</span>
                    <span>אלוף הכדורגל</span>
                </div>
                <div class="feature-item">
                    <span class="icon">📚</span>
                    <span>אוהב לקרוא</span>
                </div>
            </div>

            <button class="cta-button" onclick="celebrate()">לחץ לחגיגה!</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        function celebrate() {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#4f46e5', '#10b981', '#f59e0b', '#f472b6']
            });
        }

        // Initial celebration
        window.addEventListener('load', () => {
            setTimeout(celebrate, 1000);
        });
    </script>
</body>

</html>
